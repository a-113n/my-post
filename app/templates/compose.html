{% extends "base.html" %}
{% block content %}
<form class="card compose" action="/post" method="post" enctype="multipart/form-data">
  <label class="field">
    <span class="label">Text</span>
    <textarea name="text" id="text" rows="6" placeholder="What's happening?"></textarea>
  </label>
  <label class="field">
    <span class="label">Image (optional)</span>
    <input type="file" name="image" accept="image/*">
  </label>
  <fieldset class="platforms">
    <legend>Platforms</legend>
    {% for p in platforms %}
    <label class="chip" data-platform="{{ p }}">
      <input type="checkbox" name="platforms" value="{{ p }}" data-limit="{{ limits[p] }}">
      <span class="dot" aria-hidden="true"></span>
      <span class="name">{{ p }}</span>
      <small class="counter" data-for="{{ p }}">{{ limits[p] }}</small>
    </label>
    {% endfor %}
  </fieldset>
  <button class="btn btn-primary btn-block" type="submit">Post</button>
</form>
<script src="/static/counter.js"></script>
{% endblock %}
